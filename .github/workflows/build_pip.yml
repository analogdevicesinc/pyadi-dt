name: Build and Deploy adidt (pip)
permissions:
  contents: read

env:
  APP_NAME: pyadi-dt

on:
  workflow_dispatch:
  push:
    branches:
      - '**'
  pull_request:
    branches:
      - '**'

jobs:
  python-test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.10', '3.11', '3.12']

    name: Test Python ${{ matrix.python-version }}
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v6
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install ".[test]"

    - name: Run tests with pytest
      run: |
        pytest -vs

  kuiper64-test:
    if: github.event_name == 'pull_request' && github.base_ref == 'main'
    runs-on: ubuntu-24.04-arm
    env:
      CONTAINER_BASE_NAME: kuiper-container-basic
      DOCKER_IMAGE: aandrisa/kuiper_basic_64:latest
      IMAGE_ARCH: linux/arm64
      ARCHITECTURE: arm64
    name: Test on Kuiper64
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        path: ${{env.APP_NAME}}

    - name: Start persistent container
      run: |
        docker run -d \
            --platform ${{env.IMAGE_ARCH}} \
            --name ${{env.CONTAINER_BASE_NAME}}-${{env.ARCHITECTURE}} \
            -v "$GITHUB_WORKSPACE/${{env.APP_NAME}}:/workspace/${{env.APP_NAME}}" \
            -w /workspace/${{env.APP_NAME}} \
            ${{env.DOCKER_IMAGE}} tail -f /dev/null

    - name: Install Python dependencies
      run: |
        docker exec ${{env.CONTAINER_BASE_NAME}}-${{env.ARCHITECTURE}} sh -c "python3 -m pip install --upgrade pip &&  pip install '.[test]'"

    - name: Run tests
      run: |
        docker exec ${{env.CONTAINER_BASE_NAME}}-${{env.ARCHITECTURE}} sh -c "pytest -vs"

  build-package:
    needs: [python-test]
    runs-on: ubuntu-latest
    name: Build Package for PyPI
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.12'

    - name: Install build dependencies
      run: |
        python -m pip install --upgrade pip
        pip install build twine wheel setuptools

    - name: Build source and wheel distribution
      run: |
        python -m build --sdist --wheel

    - name: Check built distributions
      run: |
        python -m twine check dist/*

    - name: Test installation from wheel
      run: |
        pip install dist/*.whl
        python -c "import adidt; print('Package installed successfully')"
        # Test CLI if available
        adidtc --help

    - name: Upload PyPI artifacts
      uses: actions/upload-artifact@v5
      with:
        name: pypi-distributions
        path: dist/
        retention-days: 90

    - name: Upload individual source distribution
      uses: actions/upload-artifact@v5
      with:
        name: source-distribution
        path: dist/*.tar.gz
        retention-days: 90

    - name: Upload individual wheel distribution
      uses: actions/upload-artifact@v5
      with:
        name: wheel-distribution
        path: dist/*.whl
        retention-days: 90
