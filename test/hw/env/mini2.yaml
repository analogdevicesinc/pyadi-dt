## Env config for SoC tests (AD9081/ADRV9009 on ZCU102) via mini2 remote place.
##
## Run:
##   LG_COORDINATOR=10.0.0.41:20408 \
##   LG_ENV=test/hw/env/mini2.yaml \
##   pytest test/hw/test_ad9081_zcu102_system_hw.py -v -s

targets:
  main:
    features:
      - ad9081
      - adrv9009
      - zcu102
    resources:
      RemotePlace:
        name: mini2
    drivers:
      VesyncPowerDriver: {}
      USBSDMuxDriver: {}
      SerialDriver: {}
      ADIShellDriver:
        prompt: 'root@.*'
        login_prompt: 'analog login: '
        username: 'root'
        password: 'analog'
      KuiperDLDriver: {}
      MassStorageDriver:
        partition: '/dev/disk/by-partuuid/a22286d2-01'
      BootFPGASoC:
        reached_linux_marker: 'analog'
        wait_for_linux_prompt_timeout: 180
        debug_write_boot_log: true
